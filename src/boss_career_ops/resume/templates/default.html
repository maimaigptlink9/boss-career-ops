<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: A4;
    margin: 18mm 16mm;
  }

  :root {
    --primary: #1e293b;
    --accent: #0f766e;
    --accent-light: #f0fdfa;
    --accent-border: #99f6e4;
    --text: #334155;
    --text-secondary: #64748b;
    --muted: #94a3b8;
    --border: #e2e8f0;
    --bg-tag: #f0fdfa;
    --radius: 6px;
    --font-stack: "Inter", "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-stack);
    font-size: 10.5pt;
    line-height: 1.65;
    color: var(--text);
    max-width: 800px;
    margin: 0 auto;
    padding: 0;
    -webkit-font-smoothing: antialiased;
  }

  h1 {
    font-size: 24pt;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -0.02em;
    margin-bottom: 2px;
    line-height: 1.2;
  }

  h1 + p {
    color: var(--text-secondary);
    font-size: 9.5pt;
    margin-top: 4px;
    margin-bottom: 0;
    line-height: 1.5;
  }

  h2 {
    font-size: 11pt;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 18px;
    margin-bottom: 8px;
    padding-bottom: 5px;
    border-bottom: 2px solid var(--accent);
  }

  h3 {
    font-size: 11pt;
    font-weight: 600;
    color: var(--primary);
    margin-top: 10px;
    margin-bottom: 4px;
  }

  p {
    margin: 4px 0;
  }

  ul {
    padding-left: 18px;
    margin: 4px 0;
  }

  li {
    margin: 2px 0;
    margin-left: 4px;
    line-height: 1.6;
  }

  ul ul {
    padding-left: 16px;
    margin-top: 2px;
  }

  strong {
    color: var(--primary);
    font-weight: 600;
  }

  em {
    font-style: normal;
  }

  a {
    color: var(--accent);
    text-decoration: none;
    transition: color 0.15s;
  }

  a:hover {
    color: #0d9488;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    margin: 8px 0;
  }

  th, td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
    font-size: 10pt;
  }

  th {
    background: #f8fafc;
    color: var(--primary);
    font-weight: 600;
  }

  code {
    background: #f1f5f9;
    color: var(--accent);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9.5pt;
    font-family: "JetBrains Mono", "Fira Code", "Source Code Pro", monospace;
  }

  .skill-tag {
    display: inline-block;
    background: var(--bg-tag);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 9.5pt;
    font-weight: 500;
    margin: 2px 3px;
    line-height: 1.5;
  }

  .ats-keywords {
    font-size: 8.5pt;
    color: var(--muted);
    margin-top: 12px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    line-height: 1.5;
  }

  .ats-keywords strong {
    color: var(--muted);
    font-weight: 500;
  }

  .experience-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }

  .experience-header strong {
    flex: 1;
  }

  .experience-header em {
    font-style: normal;
    color: var(--text-secondary);
    font-size: 9.5pt;
    white-space: nowrap;
  }

  #resume-content > h1:first-child {
    margin-top: 0;
  }

  @media print {
    body {
      padding: 0;
    }
    h2 {
      page-break-after: avoid;
    }
    h3 {
      page-break-after: avoid;
    }
    .experience-header {
      page-break-inside: avoid;
    }
  }
</style>
</head>
<body>
<div id="resume-content">{{CONTENT}}</div>
</body>
</html>
