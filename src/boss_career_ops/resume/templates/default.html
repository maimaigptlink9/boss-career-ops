<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 20mm 15mm; }
  body { font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif; font-size: 11pt; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 22pt; color: #1a1a2e; border-bottom: 2px solid #16213e; padding-bottom: 8px; margin-bottom: 4px; }
  h1 + p { color: #555; font-size: 10pt; margin-top: 0; }
  h2 { font-size: 14pt; color: #16213e; border-bottom: 1px solid #e0e0e0; padding-bottom: 4px; margin-top: 20px; margin-bottom: 10px; }
  h3 { font-size: 12pt; color: #333; margin-top: 12px; margin-bottom: 6px; }
  p { margin: 4px 0; }
  li { margin: 2px 0; margin-left: 16px; }
  ul { padding-left: 20px; }
  ul ul { padding-left: 18px; }
  strong { color: #16213e; }
  em { font-style: normal; }
  a { color: #1a73e8; text-decoration: none; }
  table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; font-size: 10pt; }
  th { background: #f5f5f5; }
  code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 10pt; }
  .skill-tag { background: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-radius: 4px; font-size: 10pt; display: inline-block; margin: 2px; }
  .ats-keywords { font-size: 9pt; color: #888; margin-top: 8px; }
  .experience-header { display: flex; justify-content: space-between; align-items: baseline; }
  .experience-header strong { flex: 1; }
  .experience-header em { font-style: normal; color: #666; font-size: 10pt; }
</style>
</head>
<body>
<div id="resume-content">{{CONTENT}}</div>
</body>
</html>
